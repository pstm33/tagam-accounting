name: Bootstrap Source

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: ${{ !contains(github.event.head_commit.message, '[bootstrap-source]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rehydrate source archive
        shell: bash
        run: |
          set -euo pipefail
          test -d .bootstrap
          cat .bootstrap/source.b64.part* > /tmp/tagam-accounting-source.b64
          base64 -d /tmp/tagam-accounting-source.b64 > /tmp/tagam-accounting-source.zip
          unzip -o /tmp/tagam-accounting-source.zip -d .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-source.yml
          rm -f .github/workflows/ci.yml

      - name: Commit unpacked source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "tagam-accounting-bootstrap"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Bootstrap accounting source [bootstrap-source]"
          git push
